version: '3.8'

services:
  # Frontend - Next.js
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:5000/api
      - NEXT_PUBLIC_WS_URL=http://backend:5000
    depends_on:
      - backend
    networks:
      - odop-network
    restart: unless-stopped

  # Backend - Node.js Express
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
      - FRONTEND_URL=http://localhost:3000
      - JWT_SECRET=odop-connect-secret-key-change-in-production
      - DB_URL=mongodb://mongodb:27017/odop
    depends_on:
      - mongodb
      - redis
    networks:
      - odop-network
    restart: unless-stopped

  # AI Service - Python FastAPI
  ai-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile.ai
    ports:
      - "8000:8000"
    networks:
      - odop-network
    restart: unless-stopped

  # Database - MongoDB
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    networks:
      - odop-network
    restart: unless-stopped

  # Cache - Redis
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - odop-network
    restart: unless-stopped

networks:
  odop-network:
    driver: bridge

volumes:
  mongodb-data:
  redis-data: